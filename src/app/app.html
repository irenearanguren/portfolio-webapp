<div class="app-bg">
  <header class="app-header">
    <div class="brand">
      <h1>Gestion de proyectos</h1>
      <p>CRUD proyectos y tareas</p>
      <p class="small"> </p>
    </div>

    <nav class="main-nav">
      
      @if (isAuthenticated()) {
        <a routerLink="/projects" routerLinkActive="active">Proyectos</a>
        @if (canManageProjects()) {
          <a routerLink="/projects/new" routerLinkActive="active">Nuevo proyecto</a>
        }
        @if (canManageUsers()) {
          <a routerLink="/users" routerLinkActive="active">Usuarios</a>
          <a routerLink="/auth/register" routerLinkActive="active">Registrar usuario</a>
        }
        
      }
    </nav>

    <div class="user-box">
      @if (currentUser()) {
        <div>
          <strong>{{ currentUser()?.name }}</strong>
          <small>{{ currentUser()?.role }}</small>
        </div>
        <button type="button" (click)="logout()">Salir</button>
      } @else {
        <a routerLink="/auth/login">Iniciar sesion</a>
      }
    </div>
  </header>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
